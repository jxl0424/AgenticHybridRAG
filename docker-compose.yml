services:
  neo4j:
    image: neo4j:latest
    container_name: medrag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt driver
    environment:
      NEO4J_AUTH: neo4j/Pokemon0424$
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "Pokemon0424$", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medrag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"

  inngest:
    image: inngest/inngest:latest
    container_name: medrag-inngest
    restart: unless-stopped
    command: inngest dev
    ports:
      - "8288:8288"
    environment:
      - INNGEST_DEV_SERVER_PORT=8288
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  qdrant_storage:
    driver: local
