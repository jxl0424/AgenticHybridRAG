# Logging settings
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR

# Text chunking settings
chunker:
  chunk_size: 512             # used by TextChunker (get_chunk_settings)
  chunk_overlap: 128          # used by TextChunker (get_chunk_settings)
  section_max_tokens: 150     # max words per section chunk (MedicalChunker)
  sentence_group_tokens: 120  # target words per sentence-group chunk (MedicalChunker)

# LLM settings (answer generation)
llm:
  model: "qwen2.5:7b-instruct"
  base_url: "http://localhost:11434/v1"

# OpenRouter free-model fallback (answer generation)
# Set OPENROUTER_API_KEY in .env to enable. Falls back to local Ollama if unavailable.
openrouter:
  enabled: true
  api_key_env: "OPENROUTER_API_KEY"
  models:
    - "openai/gpt-oss-120b:free"
  site_url: ""     # optional — sent as HTTP-Referer (OpenRouter best practice)
  app_name: ""     # optional — sent as X-Title header

# Hybrid retrieval settings
hybrid_retrieval:
  chunk_weight: 0.2
  paper_weight: 0.6
  graph_weight: 0.2
  top_k: 5
  min_score: 0.2

# HybridRAG-Bench (arXiv CS/AI) ingestion and querying settings
hybridrag:
  embedding_model: "allenai/specter2_base"
  embedding_dim: 768
  batch_size: 64
  progress_file: "data/hybridrag/.ingest_progress.json"
  min_score: 0.05
